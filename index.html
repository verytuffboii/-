<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Delta Status</title>
    <style>
        :root {
            --primary-glow: #00ff88;
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.1);
        }

        body {
            margin: 0;
            background-color: #050505;
            color: white;
            font-family: 'Inter', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        /* Animated Background Orbs */
        .orb {
            position: absolute;
            width: 400px;
            height: 400px;
            border-radius: 50%;
            filter: blur(80px);
            z-index: -1;
            opacity: 0.12;
        }
        .orb-1 { background: var(--primary-glow); top: -10%; left: -10%; animation: float 10s infinite alternate; }
        .orb-2 { background: #0066ff; bottom: -10%; right: -10%; animation: float 12s infinite alternate-reverse; }

        @keyframes float {
            from { transform: translate(0, 0); }
            to { transform: translate(30px, 50px); }
        }

        .card {
            background: var(--glass);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border: 1px solid var(--border);
            border-radius: 40px;
            padding: 45px 25px;
            width: 88%;
            max-width: 350px;
            text-align: center;
            box-shadow: 0 40px 100px rgba(0, 0, 0, 0.8);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .status-badge {
            background: rgba(0, 255, 136, 0.1);
            color: var(--primary-glow);
            padding: 8px 20px;
            border-radius: 50px;
            font-size: 11px;
            font-weight: 900;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            border: 1px solid rgba(0, 255, 136, 0.2);
            letter-spacing: 2px;
            margin-bottom: 25px;
        }

        .dot {
            width: 8px;
            height: 8px;
            background: var(--primary-glow);
            border-radius: 50%;
            box-shadow: 0 0 15px var(--primary-glow);
        }

        .logo-container {
            width: 190px;
            height: 190px;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 10px;
        }

        .logo {
            width: 100%;
            height: 100%;
            object-fit: contain;
            filter: drop-shadow(0 0 25px rgba(0, 255, 136, 0.15));
        }

        h1 { font-size: 38px; margin: 0; font-weight: 800; letter-spacing: -2px; }
        .subtitle { color: #666; font-size: 15px; margin-top: 5px; margin-bottom: 35px; }

        .btn {
            width: 100%;
            padding: 18px;
            border-radius: 18px;
            text-decoration: none;
            font-weight: 800;
            font-size: 16px;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: 0.3s;
            box-sizing: border-box;
            margin-bottom: 12px;
        }

        .btn-site { background: #fff; color: #000; }
        .btn-launch { 
            background: linear-gradient(45deg, #00ff88, #0066ff); 
            color: #fff; 
            border: none;
        }

        .btn:active { transform: scale(0.94); }
    </style>
</head>
<body>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>

    <div class="card">
        <div class="status-badge"><div class="dot"></div> UP</div>
        <div class="logo-container"><img src="logo.png" class="logo"></div>
        <h1>Delta</h1>
        <div class="subtitle">Android • aexecutor</div>

        <a href="https://deltaexploits.gg" class="btn btn-site">Go to Site →</a>
        <a href="roblox://navigation/home" class="btn btn-launch">Launch Delta 🚀</a>
    </div>
</body>
</html>
