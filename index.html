<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Delta Executor Status</title>
    <style>
        /* Base Styling */
        :root {
            --primary-glow: #00ff88;
            --glass-bg: rgba(18, 18, 18, 0.8);
            --border-color: rgba(255, 255, 255, 0.1);
        }

        body {
            margin: 0;
            padding: 0;
            background-color: #050505;
            color: white;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        /* Animated Background Glows */
        .bg-glow {
            position: absolute;
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(0, 255, 136, 0.15) 0%, transparent 70%);
            border-radius: 50%;
            z-index: -1;
            filter: blur(50px);
            animation: move 10s infinite alternate;
        }

        @keyframes move {
            from { transform: translate(-50%, -50%); }
            to { transform: translate(50%, 50%); }
        }

        /* Glassmorphism Card */
        .card {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border-color);
            border-radius: 28px;
            padding: 40px 30px;
            width: 320px;
            text-align: center;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
            animation: cardEntrance 0.8s ease-out;
        }

        @keyframes cardEntrance {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }

        /* Status Badge */
        .status-badge {
            background: rgba(0, 255, 136, 0.1);
            color: var(--primary-glow);
            padding: 6px 16px;
            border-radius: 100px;
            font-size: 12px;
            font-weight: 700;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            border: 1px solid rgba(0, 255, 136, 0.3);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 20px;
        }

        .dot {
            width: 8px;
            height: 8px;
            background: var(--primary-glow);
            border-radius: 50%;
            box-shadow: 0 0 10px var(--primary-glow);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.4; }
            100% { opacity: 1; }
        }

        /* Ninja Logo */
        .logo {
            width: 120px;
            height: auto;
            margin-bottom: 15px;
            filter: drop-shadow(0 0 20px rgba(255, 255, 255, 0.1));
        }

        h1 {
            font-size: 32px;
            margin: 0;
            font-weight: 800;
            letter-spacing: -1px;
        }

        .subtitle {
            color: #666;
            font-size: 14px;
            margin-top: 5px;
            margin-bottom: 30px;
        }

        /* Action Button */
        .btn {
            background: #ffffff;
            color: #000;
            text-decoration: none;
            padding: 16px;
            border-radius: 14px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: 700;
            font-size: 16px;
            transition: all 0.2s ease;
            box-shadow: 0 10px 20px rgba(255, 255, 255, 0.1);
        }

        .btn:active {
            transform: scale(0.96);
            opacity: 0.9;
        }

        .btn span {
            margin-left: 8px;
        }
    </style>
</head>
<body>

    <div class="bg-glow"></div>

    <div class="card">
        <div class="status-badge">
            <div class="dot"></div>
            Up
        </div>

        <img src="logo.png" alt="Delta Logo" class="logo">

        <h1>Delta</h1>
        <div class="subtitle">Android • aexecutor</div>

        <a href="https://deltaexploits.gg" class="btn">
            Go to Site <span>→</span>
        </a>
    </div>

</body>
</html>
