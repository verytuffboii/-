<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { background-color: #0a0a0a; color: white; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: #121212; border: 1px solid #333; border-radius: 20px; padding: 25px; width: 85%; max-width: 350px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .status-badge { background: #00ff8822; color: #00ff88; padding: 5px 15px; border-radius: 20px; font-size: 12px; display: inline-block; margin-bottom: 15px; border: 1px solid #00ff8844; }
        .ninja-icon { width: 100px; height: 100px; margin: 10px auto; filter: drop-shadow(0 0 10px #333); }
        h1 { margin: 10px 0; font-size: 24px; }
        .btn { background: #1a1a1a; color: white; border: 1px solid #444; padding: 12px 25px; border-radius: 10px; text-decoration: none; display: block; margin-top: 20px; transition: 0.3s; }
        .btn:hover { background: #222; border-color: #666; }
    </style>
</head>
<body>

    <div class="card">
        <div class="status-badge">● Up</div>
        <br>
        <img src="https://deltaexploits.gg/logo.png" class="ninja-icon" alt="Delta Logo">
        <h1>Delta</h1>
        <p style="color: #888;">Android • Executor</p>
        
        <a href="https://deltaexploits.gg" class="btn">Go to Site →</a>
    </div>

</body>
</html>
