<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Delta Status</title>
    <style>
        body {
            background-color: #050505;
            color: white;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .container {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 30px;
            border-radius: 20px;
            text-align: center;
            width: 85%;
            max-width: 350px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.8);
        }

        /* Your Logo Image */
        .app-logo {
            width: 100px;
            height: 100px;
            margin-bottom: 15px;
            object-fit: contain;
        }

        h1 {
            font-size: 24px;
            margin: 0;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .status-badge {
            color: #00ff7f;
            font-weight: bold;
            text-shadow: 0 0 10px rgba(0, 255, 127, 0.5);
            margin-bottom: 25px;
            font-size: 14px;
        }

        /* UNC SECTION */
        .unc-box {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 25px;
            border: 1px solid rgba(0, 255, 127, 0.1);
        }

        .unc-label {
            display: flex;
            justify-content: space-between;
            font-size: 14px;
            margin-bottom: 8px;
            color: #ccc;
        }

        .unc-value {
            color: #00ff7f;
            text-shadow: 0 0 8px #00ff7f;
            font-weight: bold;
        }

        .progress-bg {
            width: 100%;
            height: 8px;
            background: #111;
            border-radius: 10px;
            overflow: hidden;
        }

        .progress-fill {
            width: 99%;
            height: 100%;
            background: linear-gradient(90deg, #00ff7f, #008040);
            box-shadow: 0 0 10px #00ff7f;
        }

        /* BUTTON */
        .btn-launch {
            display: block;
            width: 100%;
            padding: 15px;
            background: #00ff7f;
            color: #000;
            border-radius: 10px;
            text-decoration: none;
            font-weight: bold;
            font-size: 16px;
            transition: 0.2s;
            border: none;
            box-sizing: border-box;
        }

        .btn-launch:active {
            transform: scale(0.95);
            background: #00cc66;
        }
    </style>
</head>
<body>

    <div class="container">
        <img src="logo.png" alt="Delta Logo" class="app-logo">
        
        <h1>DELTA</h1>
        <div class="status-badge">● OPERATIONAL</div>

        <div class="unc-box">
            <div class="unc-label">
                <span>UNC</span>
                <span class="unc-value">99%</span>
            </div>
            <div class="progress-bg">
                <div class="progress-fill"></div>
            </div>
        </div>

        <a href="roblox://navigation/home" class="btn-launch">LAUNCH DELTA</a>
    </div>

</body>
</html>
