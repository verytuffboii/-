<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Delta Status</title>
    <style>
        body {
            background-color: #050505;
            color: white;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .container {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 40px 20px;
            border-radius: 24px;
            text-align: center;
            width: 80%;
            max-width: 320px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.9);
        }

        /* The Logo Icon */
        .logo-circle {
            width: 80px;
            height: 80px;
            background: rgba(0, 255, 127, 0.1);
            border: 2px solid #00ff7f;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0 auto 20px auto;
            box-shadow: 0 0 20px rgba(0, 255, 127, 0.3);
        }

        .logo-circle span {
            font-size: 40px;
            font-weight: bold;
            color: #00ff7f;
            text-shadow: 0 0 10px #00ff7f;
        }

        h1 {
            font-size: 28px;
            margin: 0;
            letter-spacing: 4px;
            color: #ffffff;
        }

        .status {
            color: #00ff7f;
            font-size: 12px;
            font-weight: bold;
            letter-spacing: 2px;
            margin-bottom: 30px;
            opacity: 0.8;
        }

        /* UNC SECTION */
        .unc-container {
            margin-bottom: 35px;
        }

        .unc-label {
            font-size: 13px;
            color: #888;
            margin-bottom: 10px;
            display: block;
        }

        .unc-value {
            color: #00ff7f;
            font-weight: bold;
            text-shadow: 0 0 5px #00ff7f;
        }

        .bar-bg {
            width: 100%;
            height: 6px;
            background: #111;
            border-radius: 10px;
            margin-top: 8px;
        }

        .bar-fill {
            width: 99%;
            height: 100%;
            background: #00ff7f;
            box-shadow: 0 0 12px #00ff7f;
            border-radius: 10px;
        }

        /* LAUNCH BUTTON */
        .launch-btn {
            display: block;
            background: #00ff7f;
            color: #000;
            text-decoration: none;
            padding: 18px;
            border-radius: 12px;
            font-weight: 900;
            font-size: 16px;
            transition: 0.2s;
            box-shadow: 0 4px 15px rgba(0, 255, 127, 0.4);
        }

        .launch-btn:active {
            transform: scale(0.96);
            background: #00cc66;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="logo-circle">
            <span>Δ</span>
        </div>
        
        <h1>DELTA</h1>
        <div class="status">OPERATIONAL</div>

        <div class="unc-container">
            <span class="unc-label">SYSTEM COMPATIBILITY: <span class="unc-value">99%</span></span>
            <div class="bar-bg">
                <div class="bar-fill"></div>
            </div>
        </div>

        <a href="roblox://navigation/home" class="launch-btn">LAUNCH EXECUTOR</a>
    </div>

</body>
</html>
