<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Delta Executor Status</title>
    <style>
        /* Base Styling & Perfect Centering */
        :root {
            --primary-glow: #00ff88;
            --glass-bg: rgba(20, 20, 20, 0.7);
            --border-color: rgba(255, 255, 255, 0.1);
        }

        body {
            margin: 0;
            padding: 0;
            background-color: #050505;
            color: white;
            font-family: 'Inter', sans-serif;
            
            /* Centering Logic */
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        /* High-Tech Background Glows */
        .bg-glow {
            position: absolute;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(0, 255, 136, 0.08) 0%, transparent 70%);
            border-radius: 50%;
            z-index: -1;
            filter: blur(60px);
            animation: move 12s infinite alternate ease-in-out;
        }

        @keyframes move {
            from { transform: translate(-30%, -30%); }
            to { transform: translate(30%, 30%); }
        }

        /* The Main Glass Card */
        .card {
            background: var(--glass-bg);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid var(--border-color);
            border-radius: 32px;
            padding: 40px 20px;
            width: 85%;
            max-width: 340px;
            text-align: center;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.7);
            animation: cardEntrance 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes cardEntrance {
            from { opacity: 0; transform: translateY(20px) scale(0.95); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        /* Status Badge */
        .status-badge {
            background: rgba(0, 255, 136, 0.05);
            color: var(--primary-glow);
            padding: 8px 20px;
            border-radius: 100px;
            font-size: 11px;
            font-weight: 800;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            border: 1px solid rgba(0, 255, 136, 0.2);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 25px;
        }

        .dot {
            width: 8px;
            height: 8px;
            background: var(--primary-glow);
            border-radius: 50%;
            box-shadow: 0 0 12px var(--primary-glow);
            animation: blink 2.5s infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; box-shadow: 0 0 12px var(--primary-glow); }
            50% { opacity: 0.3; box-shadow: 0 0 4px var(--primary-glow); }
        }

        /* Logo Styling */
        .logo {
            width: 130px;
            height: auto;
            margin-bottom: 20px;
            /* Using the logo you uploaded */
            filter: drop-shadow(0 0 15px rgba(255, 255, 255, 0.05));
        }

        h1 {
            font-size: 34px;
            margin: 0;
            font-weight: 800;
            letter-spacing: -1.5px;
        }

        .subtitle {
            color: #777;
            font-size: 14px;
            margin-top: 6px;
            margin-bottom: 35px;
            font-weight: 500;
        }

        /* The Button */
        .btn {
            background: #ffffff;
            color: #000;
            text-decoration: none;
            padding: 18px;
            border-radius: 16px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: 700;
            font-size: 16px;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 10px 25px rgba(255, 255, 255, 0.1);
        }

        .btn:active {
            transform: scale(0.95);
            background: #e0e0e0;
        }

        .btn span {
            margin-left: 10px;
            font-size: 18px;
        }
    </style>
</head>
<body>

    <div class="bg-glow"></div>

    <div class="card">
        <div class="status-badge">
            <div class="dot"></div>
            UP
        </div>

        <img src="logo.png" alt="Delta Logo" class="logo">

        <h1>Delta</h1>
        <div class="subtitle">Android • Executor</div>

        <a href="https://deltaexploits.gg" class="btn">
            Go to Site <span>→</span>
        </a>
    </div>

</body>
</html>
