<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Delta Executor Status</title>
    <style>
        :root {
            --primary-glow: #00ff88;
            --glass-bg: rgba(20, 20, 20, 0.7);
            --border-color: rgba(255, 255, 255, 0.1);
        }

        body {
            margin: 0;
            padding: 0;
            background-color: #050505;
            color: white;
            font-family: 'Inter', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        .bg-glow {
            position: absolute;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(0, 255, 136, 0.08) 0%, transparent 70%);
            border-radius: 50%;
            z-index: -1;
            filter: blur(60px);
            animation: move 12s infinite alternate ease-in-out;
        }

        @keyframes move {
            from { transform: translate(-30%, -30%); }
            to { transform: translate(30%, 30%); }
        }

        .card {
            background: var(--glass-bg);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid var(--border-color);
            border-radius: 32px;
            padding: 40px 20px;
            width: 85%;
            max-width: 340px;
            text-align: center;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.7);
            display: flex;
            flex-direction: column;
            align-items: center; /* Ensures everything inside is centered */
        }

        .status-badge {
            background: rgba(0, 255, 136, 0.05);
            color: var(--primary-glow);
            padding: 8px 20px;
            border-radius: 100px;
            font-size: 11px;
            font-weight: 800;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            border: 1px solid rgba(0, 255, 136, 0.2);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 25px;
        }

        .dot {
            width: 8px;
            height: 8px;
            background: var(--primary-glow);
            border-radius: 50%;
            box-shadow: 0 0 12px var(--primary-glow);
        }

        /* --- LOGO FIXES --- */
        .logo-container {
            width: 140px;  /* Control the total area for the logo */
            height: 140px;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 15px;
        }

        .logo {
            max-width: 100%; /* Keeps it inside the container */
            max-height: 100%;
            object-fit: contain; /* Prevents stretching */
            filter: drop-shadow(0 0 10px rgba(255, 255, 255, 0.1));
        }
        /* ------------------ */

        h1 {
            font-size: 34px;
            margin: 0;
            font-weight: 800;
            letter-spacing: -1.5px;
        }

        .subtitle {
            color: #777;
            font-size: 14px;
            margin-top: 6px;
            margin-bottom: 35px;
        }

        .btn {
            background: #ffffff;
            color: #000;
            text-decoration: none;
            padding: 18px;
            width: 100%; /* Makes button fill card width */
            box-sizing: border-box;
            border-radius: 16px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: 700;
            font-size: 16px;
            transition: 0.2s;
        }

        .btn:active {
            transform: scale(0.95);
        }
    </style>
</head>
<body>

    <div class="bg-glow"></div>

    <div class="card">
        <div class="status-badge">
            <div class="dot"></div>
            UP
        </div>

        <div class="logo-container">
            <img src="logo.png" alt="Delta Logo" class="logo">
        </div>

        <h1>Delta</h1>
        <div class="subtitle">Android • xecutor</div>

        <a href="https://deltaexploits.gg" class="btn">
            Go to Site <span>→</span>
        </a>
    </div>

</body>
</html>
