<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Delta Status</title>
    <style>
        body {
            background-color: #020205;
            color: white;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .container {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(0, 150, 255, 0.2);
            padding: 35px;
            border-radius: 25px;
            text-align: center;
            width: 85%;
            max-width: 380px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.9);
        }

        /* Rescaled Logo - Much Bigger now */
        .app-logo {
            width: 180px; 
            height: 180px;
            margin-bottom: 10px;
            object-fit: contain;
            filter: drop-shadow(0 0 15px rgba(0, 150, 255, 0.4));
        }

        h1 {
            font-size: 26px;
            margin: 0;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: #fff;
        }

        .status-badge {
            color: #0096ff;
            font-weight: bold;
            text-shadow: 0 0 10px rgba(0, 150, 255, 0.6);
            margin-bottom: 25px;
            font-size: 13px;
            letter-spacing: 1px;
        }

        /* UNC SECTION (Blue Theme) */
        .unc-box {
            background: rgba(0, 10, 30, 0.5);
            border-radius: 15px;
            padding: 15px;
            margin-bottom: 20px;
            border: 1px solid rgba(0, 150, 255, 0.15);
        }

        .unc-label {
            display: flex;
            justify-content: space-between;
            font-size: 14px;
            margin-bottom: 8px;
            color: #aaa;
        }

        .unc-value {
            color: #0096ff;
            text-shadow: 0 0 8px #0096ff;
            font-weight: bold;
        }

        .progress-bg {
            width: 100%;
            height: 8px;
            background: #0a0a10;
            border-radius: 10px;
            overflow: hidden;
        }

        .progress-fill {
            width: 99%;
            height: 100%;
            background: linear-gradient(90deg, #0096ff, #0044ff);
            box-shadow: 0 0 12px #0096ff;
        }

        /* BUTTONS */
        .btn {
            display: block;
            width: 100%;
            padding: 15px;
            margin-top: 12px;
            border-radius: 12px;
            text-decoration: none;
            font-weight: bold;
            font-size: 15px;
            transition: 0.2s;
            box-sizing: border-box;
            border: none;
        }

        .btn-launch {
            background: #0096ff;
            color: #fff;
            box-shadow: 0 4px 15px rgba(0, 150, 255, 0.3);
        }

        .btn-launch:active {
            transform: scale(0.96);
            background: #0077cc;
        }

        .btn-site {
            background: rgba(255, 255, 255, 0.05);
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .btn-site:active {
            background: rgba(255, 255, 255, 0.1);
        }
    </style>
</head>
<body>

    <div class="container">
        <img src="logo.png" alt="Delta Logo" class="app-logo">
        
        <h1>DELTA</h1>
        <div class="status-badge">● OPERATIONAL</div>

        <div class="unc-box">
            <div class="unc-label">
                <span>UNC</span>
                <span class="unc-value">99%</span>
            </div>
            <div class="progress-bg">
                <div class="progress-fill"></div>
            </div>
        </div>

        <a href="roblox://navigation/home" class="btn btn-launch">LAUNCH DELTA</a>
        <a href="https://yourwebsite.com" class="btn btn-site">GO TO WEBSITE</a>
    </div>

</body>
</html>
