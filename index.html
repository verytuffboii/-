<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Delta Status</title>
    <style>
        body {
            background-color: #020205;
            color: white;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .container {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(0, 150, 255, 0.2);
            padding: 20px;
            border-radius: 20px;
            text-align: center;
            width: 90%;
            max-width: 380px; /* Slightly wider to accommodate the big logo */
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.8);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* The Logo - Massive but properly contained */
        .app-logo {
            width: 100%; /* Spans the full width of the container */
            max-width: 350px; /* 400% scale from the original 80-90px */
            height: auto;
            margin-bottom: 10px;
            object-fit: contain;
            filter: drop-shadow(0 0 15px rgba(0, 150, 255, 0.4));
        }

        h1 {
            font-size: 24px;
            margin: 0;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .status-badge {
            color: #0096ff;
            font-weight: bold;
            text-shadow: 0 0 10px rgba(0, 150, 255, 0.5);
            margin-bottom: 20px;
            font-size: 13px;
        }

        .unc-box {
            background: rgba(0, 10, 30, 0.5);
            border-radius: 12px;
            padding: 12px;
            margin-bottom: 20px;
            border: 1px solid rgba(0, 150, 255, 0.1);
            width: 100%;
            box-sizing: border-box;
        }

        .unc-label {
            display: flex;
            justify-content: space-between;
            font-size: 13px;
            margin-bottom: 6px;
            color: #aaa;
        }

        .unc-value {
            color: #0096ff;
            font-weight: bold;
        }

        .progress-bg {
            width: 100%;
            height: 6px;
            background: #05050a;
            border-radius: 10px;
            overflow: hidden;
        }

        .progress-fill {
            width: 99%;
            height: 100%;
            background: #0096ff;
            box-shadow: 0 0 8px #0096ff;
        }

        .btn {
            display: block;
            width: 100%;
            padding: 14px;
            margin-top: 10px;
            border-radius: 10px;
            text-decoration: none;
            font-weight: bold;
            font-size: 15px;
            box-sizing: border-box;
            border: none;
            transition: 0.2s;
        }

        .btn-launch {
            background: #0096ff;
            color: #fff;
        }

        .btn-launch:active {
            transform: scale(0.98);
        }

        .btn-site {
            background: rgba(255, 255, 255, 0.05);
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.1);
            font-size: 13px;
        }
    </style>
</head>
<body>

    <div class="container">
        <img src="logo.png" alt="Delta Logo" class="app-logo">
        
        <h1>DELTA</h1>
        <div class="status-badge">● OPERATIONAL</div>

        <div class="unc-box">
            <div class="unc-label">
                <span>UNC</span>
                <span class="unc-value">99%</span>
            </div>
            <div class="progress-bg">
                <div class="progress-fill"></div>
            </div>
        </div>

        <a href="roblox://navigation/home" class="btn btn-launch">LAUNCH DELTA</a>
        <a href="https://deltaexploits.gg" class="btn btn-site">GO TO WEBSITE</a>
    </div>

</body>
</html>
