<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Delta Status</title>
    <style>
        body {
            background-color: #020205;
            color: white;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .container {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(0, 150, 255, 0.2);
            padding: 40px;
            border-radius: 30px;
            text-align: center;
            width: 90%;
            max-width: 450px; /* Widened slightly for the massive logo */
            box-shadow: 0 15px 50px rgba(0, 0, 0, 0.9);
        }

        /* 400% Upgraded Logo Size */
        .app-logo {
            width: 320px; /* Massive scale */
            height: auto;
            margin-bottom: 5px;
            object-fit: contain;
            filter: drop-shadow(0 0 20px rgba(0, 150, 255, 0.5));
        }

        h1 {
            font-size: 32px;
            margin: 0;
            letter-spacing: 5px;
            text-transform: uppercase;
            color: #fff;
            font-weight: 900;
        }

        .status-badge {
            color: #0096ff;
            font-weight: bold;
            text-shadow: 0 0 15px rgba(0, 150, 255, 0.7);
            margin-bottom: 30px;
            font-size: 14px;
            letter-spacing: 2px;
        }

        /* UNC SECTION */
        .unc-box {
            background: rgba(0, 10, 30, 0.6);
            border-radius: 18px;
            padding: 18px;
            margin-bottom: 25px;
            border: 1px solid rgba(0, 150, 255, 0.2);
        }

        .unc-label {
            display: flex;
            justify-content: space-between;
            font-size: 15px;
            margin-bottom: 10px;
            color: #bbb;
        }

        .unc-value {
            color: #0096ff;
            text-shadow: 0 0 10px #0096ff;
            font-weight: bold;
        }

        .progress-bg {
            width: 100%;
            height: 10px;
            background: #05050a;
            border-radius: 12px;
            overflow: hidden;
        }

        .progress-fill {
            width: 99%;
            height: 100%;
            background: linear-gradient(90deg, #0096ff, #0044ff);
            box-shadow: 0 0 15px #0096ff;
        }

        /* BUTTONS */
        .btn {
            display: block;
            width: 100%;
            padding: 18px;
            margin-top: 15px;
            border-radius: 15px;
            text-decoration: none;
            font-weight: bold;
            font-size: 16px;
            transition: all 0.2s ease;
            box-sizing: border-box;
            border: none;
        }

        .btn-launch {
            background: #0096ff;
            color: #fff;
            box-shadow: 0 5px 20px rgba(0, 150, 255, 0.4);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-launch:active {
            transform: scale(0.96);
            background: #0077cc;
        }

        .btn-site {
            background: rgba(255, 255, 255, 0.07);
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.15);
            font-size: 14px;
        }

        .btn-site:active {
            background: rgba(255, 255, 255, 0.12);
        }
    </style>
</head>
<body>

    <div class="container">
        <img src="logo.png" alt="Delta Logo" class="app-logo">
        
        <h1>DELTA</h1>
        <div class="status-badge">● OPERATIONAL</div>

        <div class="unc-box">
            <div class="unc-label">
                <span>UNC</span>
                <span class="unc-value">99%</span>
            </div>
            <div class="progress-bg">
                <div class="progress-fill"></div>
            </div>
        </div>

        <a href="roblox://navigation/home" class="btn btn-launch">LAUNCH DELTA</a>
        <a href="https://deltaexploits.gg" class="btn btn-site">GO TO WEBSITE</a>
    </div>

</body>
</html>
