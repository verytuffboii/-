<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Delta Status</title>
    <style>
        :root {
            --primary-glow: #00ff88;
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.08);
        }

        body {
            margin: 0;
            background-color: #050505;
            color: white;
            font-family: 'Inter', -apple-system, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        /* --- Background Polish --- */
        .orb {
            position: absolute;
            width: 300px;
            height: 300px;
            border-radius: 50%;
            filter: blur(80px);
            z-index: -1;
            opacity: 0.15;
        }
        .orb-1 { background: var(--primary-glow); top: -10%; left: -10%; animation: float 8s infinite alternate; }
        .orb-2 { background: #0066ff; bottom: -10%; right: -10%; animation: float 10s infinite alternate-reverse; }

        @keyframes float {
            from { transform: translate(0, 0); }
            to { transform: translate(20px, 40px); }
        }

        /* --- The Card --- */
        .card {
            background: var(--glass);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border: 1px solid var(--border);
            border-radius: 35px;
            padding: 50px 25px;
            width: 88%;
            max-width: 350px;
            text-align: center;
            box-shadow: 0 40px 100px rgba(0, 0, 0, 0.8);
        }

        .status-badge {
            background: rgba(0, 255, 136, 0.1);
            color: var(--primary-glow);
            padding: 8px 22px;
            border-radius: 50px;
            font-size: 12px;
            font-weight: 900;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            border: 1px solid rgba(0, 255, 136, 0.2);
            letter-spacing: 1.5px;
            margin-bottom: 30px;
        }

        .dot {
            width: 8px;
            height: 8px;
            background: var(--primary-glow);
            border-radius: 50%;
            box-shadow: 0 0 15px var(--primary-glow);
        }

        /* --- LOGO RE-SIZE --- */
        .logo-container {
            width: 180px; /* Increased from 140px */
            height: 180px;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0 auto 20px auto;
        }

        .logo {
            width: 100%;
            height: 100%;
            object-fit: contain;
            filter: drop-shadow(0 0 20px rgba(0, 255, 136, 0.1));
        }

        h1 {
            font-size: 38px;
            margin: 0;
            font-weight: 800;
            letter-spacing: -2px;
        }

        .subtitle {
            color: #555;
            font-size: 15px;
            margin-top: 8px;
            margin-bottom: 40px;
        }

        /* --- High-End Button --- */
        .btn {
            background: linear-gradient(180deg, #ffffff 0%, #e0e0e0 100%);
            color: #000;
            text-decoration: none;
            padding: 20px;
            width: 100%;
            box-sizing: border-box;
            border-radius: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: 800;
            font-size: 17px;
            transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.3);
        }

        .btn:active {
            transform: scale(0.92);
        }
    </style>
</head>
<body>

    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>

    <div class="card">
        <div class="status-badge">
            <div class="dot"></div>
            UP
        </div>

        <div class="logo-container">
            <img src="logo.png" alt="Delta Logo" class="logo">
        </div>

        <h1>Delta</h1>
        <div class="subtitle">Android • Executor</div>

        <a href="https://deltaexploits.gg" class="btn">
            Go to Site <span>→</span>
        </a>
    </div>

</body>
</html>
